<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Order Summary</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="card">

        <div class="card-image">
            <img src="https://media.istockphoto.com/id/1491461639/vector/people-in-headphones-set-of-men-and-women-listening-to-music-podcast-audio.jpg?s=612x612&w=0&k=20&c=OiBlRak6ZMpYvJb3yd5AevQFUgTj-Ya4ZzXhYMu3K4Y="
                alt="Music Illustration">
        </div>

        <div class="card-content">

            <h1>Order Summary</h1>

            <p class="description">
                You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!
            </p>

            <div class="plan-box">

                <div class="plan-info">
                    <div class="icon">🎵</div>

                    <div>
                        <p class="plan-title">Annual Plan</p>
                        <p class="plan-price">$59.99/year</p>
                    </div>
                </div>

                <a href="#" class="change">Change</a>

            </div>

            <button class="payment-btn">
                Proceed to Payment
            </button>

            <p class="cancel">Cancel Order</p>

        </div>

    </div>

</body>

</html>
